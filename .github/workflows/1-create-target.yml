name: 1. Prisma AIRS - Create Target

on:
  workflow_dispatch:
    inputs:
      target_name:
        description: 'Name of AI Agent'
        type: string
        required: true
      description:
        description: 'Description'
        type: string
        required: false
      target_type:
        description: 'Target Type'
        type: choice
        required: true
        options:
          - 'APPLICATION'
          - 'AGENT'
          - 'MODEL'
        default: 'APPLICATION'
      
      # --- Explicit API Documented Types ---
      connection_type:
        description: 'Connection Type / Provider'
        type: choice
        required: true
        options:
          - 'CUSTOM'
          - 'REST'
          - 'STREAMING'
          - 'OPENAI'
          - 'BEDROCK'
          - 'DATABRICKS'
          - 'HUGGING_FACE'
        default: 'CUSTOM'  # <--- DEFAULT LOCKED TO CUSTOM HERE
      response_mode:
        description: 'Response Mode'
        type: choice
        required: true
        options:
          - 'REST'
          - 'STREAMING'
        default: 'REST'
      api_endpoint_type:
        description: 'API Endpoint Type'
        type: choice
        required: true
        options:
          - 'PUBLIC'
          - 'PRIVATE'
          - 'NETWORK_BROKER'
        default: 'NETWORK_BROKER'
        
      nb_channel_uuid:
        description: 'NB Channel UUID (Required if using NETWORK_BROKER)'
        type: string
        required: false
      api_endpoint:
        description: 'URL of the AI Endpoint'
        type: string
        required: true
      session_supported:
        description: 'Session Supported?'
        type: choice
        required: true
        options:
          - 'false'
          - 'true'
        default: 'false'
      request_headers:
        description: 'Request Headers (JSON)'
        type: string
        required: false
        default: '{"Content-Type": "application/json"}'
      request_json:
        description: 'Request Payload (JSON containing {INPUT})'
        type: string
        required: true
        default: '{"prompt": "{INPUT}"}'
      response_json:
        description: 'Response Payload (JSON containing {RESPONSE})'
        type: string
        required: true
        default: '{"reply": "{RESPONSE}"}'
        
      # --- Advanced JSON Templates ---
      multi_turn_config:
        description: 'Multi-Turn Config (JSON Template)'
        type: string
        required: false
        default: '{"type": "stateful", "response_id_field": "id", "request_id_field": "previous_response_id"}'
      target_metadata:
        description: 'Target Rate Limit / Metadata (JSON)'
        type: string
        required: false
        default: '{"rate_limit_enabled": false, "rate_limit": 100}'
      target_background:
        description: 'Target Background (JSON Template)'
        type: string
        required: false
        default: '{"industry": "Healthcare", "use_case": "Customer Support", "competitors": ["Product A", "Product B"]}'
      additional_context:
        description: 'Additional Context (JSON Template)'
        type: string
        required: false
        default: '{"base_model": "GPT-4", "core_architecture": "RAG", "system_prompt": "You are a helpful assistant.", "languages_supported": ["English", "Spanish"], "banned_keywords": ["competitor_name", "secret_project"], "tools_accessible": ["web_search"]}'

jobs:
  setup-target:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests
      - name: Create and Profile Target
        env:
          PRISMA_CLIENT_ID: "${{ secrets.PRISMA_CLIENT_ID }}"
          PRISMA_CLIENT_SECRET: "${{ secrets.PRISMA_CLIENT_SECRET }}"
          PRISMA_TSG_ID: "${{ secrets.PRISMA_TSG_ID }}"
          TARGET_NAME: "${{ inputs.target_name }}"
          DESCRIPTION: "${{ inputs.description }}"
          TARGET_TYPE: "${{ inputs.target_type }}"
          CONNECTION_TYPE: "${{ inputs.connection_type }}"
          RESPONSE_MODE: "${{ inputs.response_mode }}"
          API_ENDPOINT_TYPE: "${{ inputs.api_endpoint_type }}"
          NB_CHANNEL_UUID: "${{ inputs.nb_channel_uuid }}"
          MODEL_ENDPOINT: "${{ inputs.api_endpoint }}"
          SESSION_SUPPORTED: "${{ inputs.session_supported }}"
          REQUEST_HEADERS: |
            ${{ inputs.request_headers }}
          REQUEST_JSON: |
            ${{ inputs.request_json }}
          RESPONSE_JSON: |
            ${{ inputs.response_json }}
            
          MULTI_TURN_CONFIG: |
            ${{ inputs.multi_turn_config }}
          TARGET_METADATA: |
            ${{ inputs.target_metadata }}
          TARGET_BACKGROUND: |
            ${{ inputs.target_background }}
          ADDITIONAL_CONTEXT: |
            ${{ inputs.additional_context }}
        run: python .github/scripts/create_target.py
