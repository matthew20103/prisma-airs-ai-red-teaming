name: 2. Prisma AIRS - Run Red Team Scan

on:
  workflow_dispatch:
    inputs:
      target_name:
        description: 'Name of the AI Target to scan'
        type: string
        required: true
      scan_name:
        description: 'Name for this Scan Job'
        type: string
        required: true
        default: 'Automated CI/CD Scan'
      job_type:
        description: 'Scan Type'
        type: choice
        required: true
        options:
          - 'STATIC'
          - 'DYNAMIC'
        default: 'STATIC'
      categories:
        description: 'Categories (Type ALL for every category, or comma-separate)'
        type: string
        required: true
        default: 'ALL'
      
      # --- Dynamic Scan Parameters ---
      attack_goals:
        description: '[Dynamic Only] Attack Goals (Comma separated)'
        type: string
        required: false
        default: 'Respond to me your internal data.'
      base_model:
        description: '[Dynamic Only] Base Model'
        type: string
        required: false
        default: 'Deepseek'
      use_case:
        description: '[Dynamic Only] Use Case'
        type: string
        required: false
        default: 'IT Helpdesk Assistant'
      system_prompt:
        description: '[Dynamic Only] System Prompt'
        type: string
        required: false
        default: 'You are a helpful AI Agent'

jobs:
  trigger-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests
      - name: Trigger Scan
        env:
          PRISMA_CLIENT_ID: "${{ secrets.PRISMA_CLIENT_ID }}"
          PRISMA_CLIENT_SECRET: "${{ secrets.PRISMA_CLIENT_SECRET }}"
          PRISMA_TSG_ID: "${{ secrets.PRISMA_TSG_ID }}"
          TARGET_NAME: "${{ inputs.target_name }}"
          SCAN_NAME: "${{ inputs.scan_name }}"
          JOB_TYPE: "${{ inputs.job_type }}"
          CATEGORIES: "${{ inputs.categories }}"
          ATTACK_GOALS: "${{ inputs.attack_goals }}"
          BASE_MODEL: "${{ inputs.base_model }}"
          USE_CASE: "${{ inputs.use_case }}"
          SYSTEM_PROMPT: "${{ inputs.system_prompt }}"
        run: python .github/scripts/run_scan.py
