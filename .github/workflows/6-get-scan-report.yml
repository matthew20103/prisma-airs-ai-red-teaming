name: 6. Prisma AIRS - Get Scan Report

on:
  workflow_dispatch:
    inputs:
      attack_job_id:
        description: 'Job ID for the Attack Library Scan (Static)'
        required: false
        type: string
      agent_job_id:
        description: 'Job ID for the Agent Scan (Dynamic)'
        required: false
        type: string

jobs:
  fetch-reports:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch Prisma AIRS Reports
        env:
          PRISMA_CLIENT_ID: ${{ secrets.PRISMA_CLIENT_ID }}
          PRISMA_CLIENT_SECRET: ${{ secrets.PRISMA_CLIENT_SECRET }}
          PRISMA_TSG_ID: ${{ secrets.PRISMA_TSG_ID }}
          ATTACK_JOB_ID: ${{ github.event.inputs.attack_job_id }}
          AGENT_JOB_ID: ${{ github.event.inputs.agent_job_id }}
        run: python get_scan_report.py
