name: Prisma AIRS AI Red Teaming

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      target_name:
        description: 'Name of the AI Target in Prisma AIRS'
        required: true
        default: 'Production-AI-Agent'
      api_endpoint:
        description: 'URL of the AI Model Endpoint'
        required: true
        default: 'https://mock-ai-app.example.com/api/chat'
      request_json:
        description: 'JSON structure for the Request Payload (Must contain {INPUT})'
        required: true
        default: '{"prompt": "{INPUT}"}'
      response_json:
        description: 'JSON structure for the Response Payload (Must contain {RESPONSE})'
        required: true
        default: '{"reply": "{RESPONSE}"}'

jobs:
  run-ai-security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Execute AI Red Teaming Scan
        env:
          # Double quotes protect the curly braces from confusing the YAML parser
          PRISMA_CLIENT_ID: "${{ secrets.PRISMA_CLIENT_ID }}"
          PRISMA_CLIENT_SECRET: "${{ secrets.PRISMA_CLIENT_SECRET }}"
          PRISMA_TSG_ID: "${{ secrets.PRISMA_TSG_ID }}"
          TARGET_NAME: "${{ inputs.target_name || 'Production-AI-Agent' }}"
          MODEL_ENDPOINT: "${{ inputs.api_endpoint || 'https://mock-ai-app.example.com/api/chat' }}"
          
          # The pipe '|' tells YAML to read the JSON exactly as-is without breaking
          REQUEST_JSON: |
            ${{ inputs.request_json || '{"prompt": "{INPUT}"}' }}
          RESPONSE_JSON: |
            ${{ inputs.response_json || '{"reply": "{RESPONSE}"}' }}
          
        run: python .github/scripts/run_airs_scan.py

      - name: Upload Scan Report Artifacts
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: ai-security-reports
          path: |
            airs_attack_library_report.json
            airs_agent_report.json
