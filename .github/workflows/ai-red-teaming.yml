name: Prisma AIRS AI Red Teaming

on:
  push:
    branches: [ "main" ]
  # This adds the manual trigger with dynamic input fields in the GitHub UI!
  workflow_dispatch:
    inputs:
      target_name:
        description: 'Name of the AI Target in Prisma AIRS'
        required: true
        default: 'Production-AI-Agent'
      api_endpoint:
        description: 'URL of the AI Model Endpoint'
        required: true
        default: 'https://mock-ai-app.example.com/api/chat'
      request_json:
        description: 'JSON structure for the Request Payload (Must contain {INPUT})'
        required: true
        default: '{"prompt": "{INPUT}"}'
      response_json:
        description: 'JSON structure for the Response Payload (Must contain {RESPONSE})'
        required: true
        default: '{"reply": "{RESPONSE}"}'

jobs:
  run-ai-security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Execute AI Red Teaming Scan
        env:
          PRISMA_CLIENT_ID: ${{ secrets.PRISMA_CLIENT_ID }}
          PRISMA_CLIENT_SECRET: ${{ secrets.PRISMA_CLIENT_SECRET }}
          PRISMA_TSG_ID: ${{ secrets.PRISMA_TSG_ID }}
          
          # Map the user inputs down to the Python Script. 
          # The '||' acts as a fallback if the workflow is triggered by a code push instead of manual dispatch.
          TARGET_NAME: ${{ github.event.inputs.target_name || 'Production-AI-Agent' }}
          MODEL_ENDPOINT: ${{ github.event.inputs.api_endpoint || 'https://mock-ai-app.example.com/api/chat' }}
          REQUEST_JSON: ${{ github.event.inputs.request_json || '{"prompt": "{INPUT}"}' }}
          RESPONSE_JSON: ${{ github.event.inputs.response_json || '{"reply": "{RESPONSE}"}' }}
          
        run: python .github/scripts/run_airs_scan.py

      - name: Upload Scan Report Artifacts
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: ai-security-reports
          path: |
            airs_attack_library_report.json
            airs_agent_report.json
