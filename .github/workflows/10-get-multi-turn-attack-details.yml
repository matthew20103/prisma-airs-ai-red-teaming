name: 10. Prisma AIRS - Get Multi-Turn Attack Details

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID for the Scan (Static or Dynamic)'
        required: true
        type: string
      attack_id:
        description: 'Specific Attack ID to fetch multi-turn details for'
        required: true
        type: string

jobs:
  fetch-multi-turn-details:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch Multi-Turn Attack Details
        env:
          PRISMA_CLIENT_ID: ${{ secrets.PRISMA_CLIENT_ID }}
          PRISMA_CLIENT_SECRET: ${{ secrets.PRISMA_CLIENT_SECRET }}
          PRISMA_TSG_ID: ${{ secrets.PRISMA_TSG_ID }}
          JOB_ID: ${{ github.event.inputs.job_id }}
          ATTACK_ID: ${{ github.event.inputs.attack_id }}
        run: python .github/scripts/get_multi_turn_details.py
