name: 6. Prisma AIRS - List Scan Jobs

on:
  workflow_dispatch:
    inputs:
      target_name:
        description: 'Name of the Prisma AIRS Target'
        required: true
        type: string
        default: 'my-ai-app-production'

jobs:
  list-jobs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch Job List
        env:
          PRISMA_CLIENT_ID: ${{ secrets.PRISMA_CLIENT_ID }}
          PRISMA_CLIENT_SECRET: ${{ secrets.PRISMA_CLIENT_SECRET }}
          PRISMA_TSG_ID: ${{ secrets.PRISMA_TSG_ID }}
          TARGET_NAME: ${{ github.event.inputs.target_name }}
        run: python .github/scripts/list_scan_jobs.py
